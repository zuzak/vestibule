# Example vestibule config.
#
# Environment variables are interpolated with ${VAR}. Unset variables resolve
# to an empty string; vestibule fails config validation rather than silently
# making an unauthenticated request if a required credential interpolates to
# empty only when that produces an otherwise-invalid config.
#
# Pass the path via VESTIBULE_CONFIG:
#     VESTIBULE_CONFIG=./example.yaml ./vestibule
#
# Vestibule is an internal service. It has no inbound auth at the
# application layer — the network boundary (ClusterIP, no ingress) is the
# security story. The MCP server in ./mcp is the intended consumer.

listen: ":8080"
metrics_listen: ":9090"

upstreams:
  # A form-login upstream with a typed date param and a jq filter.
  example_form:
    auth:
      type: form_login
      login_url: https://example.com/login
      login_method: POST
      form_fields:
        Email: ${EXAMPLE_FORM_EMAIL}
        Password: ${EXAMPLE_FORM_PASSWORD}
    endpoints:
      diary:
        # type defaults to "rest". Valid values: rest, graphql.
        # graphql is reserved and currently returns 501 Not Implemented.
        type: rest
        url: https://example.com/api/diary/entries
        description: |
          Daily diary for a given day. Focus on short-term trends
          (last 14-28 days).
        params:
          # Each param has a type (string, integer, date; defaults to string),
          # a description, an optional default, and an optional required flag.
          # required and default are mutually exclusive.
          date:
            type: date
            description: "YYYY-MM-DD, or today/yesterday/tomorrow/today±N"
            default: today
        # Optional jq filter applied to upstream responses before caching.
        # Compiled at config load; invalid expressions fail startup. Runtime
        # errors degrade to "serve unfiltered".
        filter: |
          {date: .date, entries: .entries}
        min_interval: 30s
        # Optional: expose this endpoint as an MCP tool. Omit the block to
        # keep the endpoint reachable via Vestibule but not as a tool.
        mcp:
          tool_name: get_food_diary

      settings:
        url: https://example.com/api/settings
        description: Account-level settings; rarely changes.
        min_interval: 5m
        # No mcp block — reachable at /example_form/settings but not
        # exposed as a tool.

  # A header-auth upstream with a typed integer param.
  example_bearer:
    auth:
      type: header
      headers:
        Authorization: "Bearer ${EXAMPLE_BEARER_TOKEN}"
        X-Tenant: acme
    endpoints:
      widgets:
        url: https://example.com/api/widgets
        description: Widget inventory.
        params:
          status:
            type: string
            description: "Filter by status (active, archived)."
          limit:
            type: integer
            description: "Max results to return."
            default: "50"
        min_interval: 10s
        mcp:
          tool_name: list_widgets
