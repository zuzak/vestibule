name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go build, test, vet, fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "Unformatted files:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  python:
    name: Python MCP tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mcp/pyproject.toml

      - name: Install
        run: pip install -e '.[dev]'

      - name: Test
        run: pytest

  docker:
    name: Docker multi-arch build
    runs-on: ubuntu-latest
    needs: [go, python]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: vestibule
            context: .
          - image: vestibule-mcp
            context: ./mcp
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} for linux/arm64 and linux/amd64
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64,linux/amd64
          push: false
          tags: ${{ matrix.image }}:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
